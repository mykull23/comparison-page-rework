<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SleePare | Detailed Mattress Comparison</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Detailed Comparison Page Styles */
        .comparison-header {
            background: linear-gradient(135deg, #f8f9ff 0%, #ffffff 100%);
            border-radius: 28px;
            padding: 32px 40px;
            margin-bottom: 40px;
            border: 1px solid var(--border-light);
        }
        
        .brand-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border-light);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .brand-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }
        
        .spec-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }
        
        .spec-table th {
            background: var(--bg-light);
            padding: 16px 20px;
            text-align: left;
            font-weight: 600;
            color: var(--heading-color);
        }
        
        .spec-table td {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-light);
        }
        
        .spec-table tr:last-child td {
            border-bottom: none;
        }
        
        .score-badge {
            display: inline-block;
            background: linear-gradient(135deg, #5E00FF 0%, #C800FF 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .review-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border-light);
        }
        
        .expert-quote {
            background: var(--bg-light);
            padding: 20px;
            border-radius: 16px;
            margin-top: 16px;
            border-left: 3px solid var(--primary);
            font-style: italic;
            font-size: 14px;
            color: #5a6874;
        }
        
        .feature-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 16px 0;
        }
        
        .feature-tag {
            background: rgba(44, 95, 138, 0.1);
            color: var(--accent-blue);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .firmness-bar-container {
            background: #e9ecef;
            height: 8px;
            border-radius: 10px;
            width: 100%;
            margin-top: 8px;
        }
        
        .firmness-fill {
            height: 8px;
            border-radius: 10px;
            background: linear-gradient(135deg, #5E00FF 0%, #C800FF 100%);
            width: 0%;
        }
        
        /* Modal for detailed page */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }
        
        .modal-content {
            background: white;
            margin: 5% auto;
            width: 90%;
            max-width: 600px;
            border-radius: 24px;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .modal-close {
            float: right;
            font-size: 24px;
            cursor: pointer;
            padding: 16px;
        }
        
        .brand-logo-modal {
            width: 100px;
            height: auto;
            max-height: 32px;
            object-fit: contain;
            margin: 0 auto 12px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="padding: 24px 0 0 0; margin-bottom: 24px;">
            <a href="index.html" id="backLink" style="display: inline-flex; align-items: center; gap: 8px; color: var(--heading-color); text-decoration: none; font-weight: 600; font-size: 14px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18L9 12L15 6"/></svg>
                Back to Comparison Tool
            </a>
        </div>

        <div id="comparisonContent">
            <div class="error-message">
                <div class="section-tag purple">Loading</div>
                <h2>Loading comparison data...</h2>
            </div>
        </div>
    </div>

    <a href="index.html" class="floating-back-btn" id="floatingBackBtn" aria-label="Back">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M19 12H5M12 19L5 12L12 5"/></svg>
    </a>

    <!-- Modal for detailed page -->
    <div id="mattressModal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/detailed.js"></script>
</body>
</html>

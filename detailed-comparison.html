<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SleePare | Detailed Mattress Comparison</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Detailed Comparison Page Styles */
        .comparison-header {
            background: linear-gradient(135deg, #f8f9ff 0%, #ffffff 100%);
            border-radius: 28px;
            padding: 32px 40px;
            margin-bottom: 40px;
            border: 1px solid var(--border-light);
        }
        
        .brand-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border-light);
            transition: var(--transition);
        }
        
        .brand-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }
        
        .spec-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }
        
        .spec-table th {
            background: var(--bg-light);
            padding: 16px 20px;
            text-align: left;
            font-weight: 600;
            color: var(--heading-color);
        }
        
        .spec-table td {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-light);
        }
        
        .spec-table tr:last-child td {
            border-bottom: none;
        }
        
        .score-badge {
            display: inline-block;
            background: var(--gradient-primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .review-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border-light);
        }
        
        .expert-quote {
            background: var(--bg-light);
            padding: 20px;
            border-radius: 16px;
            margin-top: 16px;
            border-left: 3px solid var(--primary);
            font-style: italic;
            font-size: 14px;
            color: #5a6874;
        }
        
        .feature-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 16px 0;
        }
        
        .feature-tag {
            background: rgba(44, 95, 138, 0.1);
            color: var(--accent-blue);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .summary-section {
            background: linear-gradient(135deg, var(--bg-light) 0%, white 100%);
            border-radius: 20px;
            padding: 28px;
            margin: 32px 0;
        }
        
        .summary-item {
            padding: 16px 0;
            border-bottom: 1px solid var(--border-light);
        }
        
        .summary-item:last-child {
            border-bottom: none;
        }
        
        .winner-badge {
            background: var(--accent-blue);
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }
        
        .bottom-line {
            background: var(--heading-color);
            color: white;
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            margin-top: 40px;
        }
        
        .bottom-line h3 {
            color: white;
            margin-bottom: 16px;
        }
        
        .firmness-bar-container {
            background: #e9ecef;
            height: 8px;
            border-radius: 10px;
            width: 100%;
            margin-top: 8px;
        }
        
        .firmness-fill {
            height: 8px;
            border-radius: 10px;
            background: var(--gradient-primary);
            width: 0%;
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="padding: 24px 0 0 0; margin-bottom: 24px;">
            <a href="index.html" id="backLink" style="display: inline-flex; align-items: center; gap: 8px; color: var(--heading-color); text-decoration: none; font-weight: 600; font-size: 14px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18L9 12L15 6"/></svg>
                Back to Comparison Tool
            </a>
        </div>

        <div id="comparisonContent">
            <div class="error-message">
                <div class="section-tag purple">Loading</div>
                <h2>Loading comparison data...</h2>
            </div>
        </div>
    </div>

    <a href="index.html" class="floating-back-btn" id="floatingBackBtn" aria-label="Back">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M19 12H5M12 19L5 12L12 5"/></svg>
    </a>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/detailed.js"></script>
</body>
</html>
